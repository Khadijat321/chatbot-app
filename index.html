<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Super AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #ececf1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { font-size: 20px; font-weight: 500; }
        
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        
        .header-btn {
            background: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .header-btn:hover { background: #3d3d3d; }
        
        .mode-selector {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            overflow-x: auto;
        }
        
        .mode-btn {
            background: #2d2d2d;
            border: 1px solid #444;
            color: #aaa;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .mode-btn:hover { background: #3d3d3d; color: #fff; }
        .mode-btn.active { 
            background: #10a37f; 
            color: #fff; 
            border-color: #10a37f;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }
        
        .message {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user { justify-content: flex-end; }
        
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
        }
        
        .message.user .message-content {
            background: #2b2b40;
            color: #fff;
        }
        
        .message.bot .message-content {
            background: #2d2d2d;
            color: #ececf1;
            border: 1px solid #444;
        }
        
        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .message.bot .avatar { background: #10a37f; }
        .message.user .avatar {
            background: #5436da;
            margin-right: 0;
            margin-left: 10px;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px 20px;
            color: #8e8ea0;
            font-style: italic;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .typing-indicator.active { display: block; }
        
        .input-area {
            background: #1a1a1a;
            padding: 15px 20px;
            border-top: 1px solid #333;
        }
        
        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .input-container {
            flex: 1;
            position: relative;
        }
        
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #444;
            border-radius: 12px;
            background: #2d2d2d;
            color: #ececf1;
            font-size: 15px;
            outline: none;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            font-family: inherit;
        }
        
        textarea:focus { border-color: #10a37f; }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .send-btn {
            background: #10a37f;
            color: white;
        }
        
        .send-btn:hover { background: #0d8c6d; }
        .send-btn:disabled { background: #565869; cursor: not-allowed; }
        
        .file-input {
            display: none;
        }
        
        .upload-btn {
            background: #5436da;
            color: white;
        }
        
        .upload-btn:hover { background: #4325c9; }
        
        pre {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid #333;
        }
        
        code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #d4d4d4;
        }
        
        a { color: #10a37f; }
        
        .preview-link {
            display: inline-block;
            background: #10a37f;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            margin: 10px 0;
        }
        
        .preview-link:hover { background: #0d8c6d; }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Super AI Assistant</h1>
        <div class="header-buttons">
            <button class="header-btn" onclick="clearChat()">🗑️ Clear</button>
            <button class="header-btn" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('chat')">💬 Chat</button>
        <button class="mode-btn" onclick="setMode('code')">💻 Code</button>
        <button class="mode-btn" onclick="setMode('website')">🌐 Website</button>
        <button class="mode-btn" onclick="setMode('analyze')">📊 Analyze</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message bot">
            <div class="avatar">🤖</div>
            <div class="message-content">
                Hello! I'm your Super AI Assistant. I can:<br><br>
                💬 <b>Chat</b> - Have conversations on any topic<br>
                💻 <b>Code</b> - Write and execute Python code<br>
                🌐 <b>Build Websites</b> - Create complete HTML websites<br>
                📊 <b>Analyze Data</b> - Analyze and provide insights<br><br>
                Select a mode above and start chatting!
            </div>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        🤖 Thinking...
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <div class="input-container">
                <textarea id="userInput" placeholder="Type your message..." rows="1"
                    onkeypress="handleKeyPress(event)"
                    oninput="autoResize(this)"></textarea>
            </div>
            <div class="action-buttons">
                <button class="action-btn upload-btn" onclick="document.getElementById('fileInput').click()">
                    📎
                </button>
                <input type="file" id="fileInput" class="file-input" onchange="uploadFile(this)">
                <button class="action-btn send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        let currentMode = 'chat';
        const BACKEND_URL = 'https://my-chatbot-backend-9i4u.onrender.com';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const placeholders = {
                chat: 'Ask me anything...',
                code: 'Describe what code you want me to write...',
                website: 'Describe the website you want me to build...',
                analyze: 'Paste data or describe what to analyze...'
            };
            userInput.placeholder = placeholders[mode];
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = isUser ? '👤' : '🤖';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = formatMessage(text);
            
            if (isUser) {
                messageDiv.appendChild(content);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(content);
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function formatMessage(text) {
            // Convert URLs to links
            text = text.replace(
                /(https?:\/\/[^\s]+)/g, 
                '<a href="$1" target="_blank">$1</a>'
            );
            
            // Convert markdown bold
            text = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            
            // Convert markdown code blocks
            text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            
            // Convert newlines to breaks
            text = text.replace(/\n/g, '<br>');
            
            return text;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';
            userInput.style.height = 'auto';
            
            typingIndicator.classList.add('active');
            sendBtn.disabled = true;

            const endpoints = {
                chat: '/chat',
                code: '/execute',
                website: '/build-website',
                analyze: '/analyze'
            };

            try {
                const response = await fetch(BACKEND_URL + endpoints[currentMode], {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: 'user-1'
                    })
                });

                if (!response.ok) throw new Error('Failed to get response');
                const data = await response.json();
                
                let reply = data.reply;
                
                // Add preview link for websites
                if (data.preview_url) {
                    reply += `<br><br><a href="${data.preview_url}" target="_blank" class="preview-link">🌐 Open Website</a>`;
                }
                
                addMessage(reply, false);
            } catch (error) {
                addMessage('❌ Error: ' + error.message + '<br><br>Make sure the backend is running at:<br>' + BACKEND_URL, false);
            } finally {
                typingIndicator.classList.remove('active');
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        async function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            addMessage(`📁 Uploading: ${file.name}`, true);
            typingIndicator.classList.add('active');
            sendBtn.disabled = true;

            try {
                const response = await fetch(BACKEND_URL + '/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                addMessage(data.reply, false);
            } catch (error) {
                addMessage('❌ Error uploading file: ' + error.message, false);
            } finally {
                typingIndicator.classList.remove('active');
                sendBtn.disabled = false;
                input.value = '';
            }
        }

        async function clearChat() {
            try {
                await fetch(BACKEND_URL + '/clear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: 'user-1' })
                });
            } catch (e) {}
            
            chatContainer.innerHTML = `
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="message-content">Chat history cleared! How can I help you?</div>
                </div>
            `;
        }

        function toggleTheme() {
            // Simple theme toggle
            document.body.style.filter = document.body.style.filter === 'invert(1)' ? '' : 'invert(1)';
        }

        userInput.focus();
    </script>
</body>
</html>
